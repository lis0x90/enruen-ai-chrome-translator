<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EN/RU Translator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 420px;
      font-family: sans-serif;
      font-size: 14px;
      background: #f8f9fa;
      color: #333;
    }

    header {
      background: #1a73e8;
      color: white;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .fields {
      display: flex;
      flex-direction: column;
    }

    .field {
      display: flex;
      flex-direction: column;
      padding: 12px 16px;
      background: white;
      border-bottom: 1px solid #e0e0e0;
    }

    .field-label {
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #1a73e8;
      margin-bottom: 6px;
    }

    textarea {
      width: 100%;
      height: 110px;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 8px;
      font-size: 14px;
      font-family: sans-serif;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      color: #333;
    }

    textarea:focus {
      border-color: #1a73e8;
    }

    .divider {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      background: #f8f9fa;
      gap: 8px;
      color: #999;
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #ddd;
    }

    #status {
      text-align: center;
      padding: 6px;
      font-size: 12px;
      color: green;
      min-height: 24px;
      background: #f8f9fa;
    }
  </style>
</head>
<body>

  <header>EN / RU Translator</header>

  <div class="fields">

    <div class="field">
      <div class="field-label">English</div>
      <textarea id="en-text"
                data-dir="en-ru"
                data-target="ru-text"
                placeholder="Type English text here..."></textarea>
    </div>

    <div class="divider">EN ↕ RU</div>

    <div class="field">
      <div class="field-label">Russian</div>
      <textarea id="ru-text"
                data-dir="ru-en"
                data-target="en-text"
                placeholder="Введите русский текст здесь..."></textarea>
    </div>

  </div>

  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
